# Version 1 - Basic Add Donor
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blood-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blood-v1
  template:
    metadata:
      labels:
        app: blood-v1
    spec:
      containers:
      - name: blood-v1
        image: sumedha33887/bloodbank:v1
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: blood-v1-service
spec:
  type: NodePort
  selector:
    app: blood-v1
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001

