apiVersion: apps/v1
kind: Deployment
metadata:
  name: blood-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blood-v3
  template:
    metadata:
      labels:
        app: blood-v3
    spec:
      containers:
      - name: blood-v3
        image: sumedha33887/bloodbank:v3
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: blood-v3-service
spec:
  type: NodePort
  selector:
    app: blood-v3
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30003